# ============================================================
#  narchsafe configuration
#  Default path : /etc/narchsafe.conf
#  Override     : narchsafe --config /path/to/file
#
#  All lines beginning with # or ; are comments.
#  Inline comments (key = value  # comment) are supported.
#  Missing keys fall back to compiled-in defaults shown below.
# ============================================================

# ------------------------------------------------------------------
# BACKUP
# ------------------------------------------------------------------

# Directory where timestamped backup folders are created.
# The directory and its parents are created automatically.
#backup_base = /var/lib/narchsafe/backups

# Keep the N most recent backup directories; older ones are pruned.
# Minimum: 1
#keep_count = 5

# Minimum free space required on the backup filesystem before starting.
# If available space is below this value the update is aborted.
# Unit: megabytes
#min_free_mb = 512

# How to back up /boot:
#   no  → fast cp -a  (creates a boot/ subdirectory in the backup)
#   yes → compressed tar.gz archive  (boot_backup.tar.gz)
#boot_compress = no

# ------------------------------------------------------------------
# PACMAN / UPDATE
# ------------------------------------------------------------------

# Directory where pacman stores downloaded packages.
# Used for cache-integrity check and during rollback.
#pacman_cache = /var/cache/pacman/pkg

# Automatically roll back if the update or post-update checks fail.
#   yes → roll back without prompting (recommended for unattended runs)
#   no  → leave the system as-is and print manual recovery instructions
#auto_rollback = yes

# ------------------------------------------------------------------
# SNAPSHOT  (Btrfs / ZFS only)
# ------------------------------------------------------------------

# Create a read-only filesystem snapshot before updating.
# Silently ignored on non-Btrfs / non-ZFS systems.
#snapshot = yes

# ------------------------------------------------------------------
# POST-UPDATE CHECKS
# ------------------------------------------------------------------

# Maximum age (seconds) of /boot/vmlinuz-linux after a kernel update.
# If the file is older than this the install is considered failed and
# auto-rollback is triggered (when auto_rollback = yes).
# Increase on slow machines with many kernel modules.
#kernel_fresh_secs = 300

# ------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------

# Path to the narchsafe log file (created automatically, mode 0600).
#log_file = /var/log/narchsafe.log

# ------------------------------------------------------------------
# LOCK FILE
# ------------------------------------------------------------------

# Prevents parallel narchsafe invocations.
# Should live on a tmpfs cleared on boot.
#lock_file = /run/narchsafe.lock

# ------------------------------------------------------------------
# NOTIFICATIONS — desktop  (notify-send / libnotify)
# ------------------------------------------------------------------

# Requires: libnotify  (pacman -S libnotify)
# Only works when a D-Bus session bus is running (desktop session,
# NOT from a plain tty or cron job).
#notify_libnotify = no

# ------------------------------------------------------------------
# NOTIFICATIONS — Telegram bot
# ------------------------------------------------------------------

# Requires: curl  (usually pre-installed on Arch)
#
# Quick setup:
#   1. Create a bot: talk to @BotFather on Telegram → /newbot
#   2. Get your chat ID: send a message to your bot, then open
#        https://api.telegram.org/bot<YOUR_TOKEN>/getUpdates
#      and look for  "chat":{"id": <NUMBER>}
#   3. Fill in telegram_token and telegram_chat_id below, then set
#      notify_telegram = yes

#notify_telegram  = no
#telegram_token   =
#telegram_chat_id =

# Override the Telegram API base URL (useful when behind a proxy).
#telegram_api_url = https://api.telegram.org
