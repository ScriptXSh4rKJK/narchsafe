# ============================================================
#  narchsafe configuration
#  Default path: /etc/narchsafe.conf
#  Override:     narchsafe --config /path/to/file
# ============================================================

#backup_base        = /var/lib/narchsafe/backups
#pacman_cache       = /var/cache/pacman/pkg
#log_file           = /var/log/narchsafe.log
#lock_file          = /var/run/narchsafe.lock

# Keep the N most recent backups; older ones are pruned automatically
#keep_count         = 5

# Minimum free space required on the backup filesystem (MB)
#min_free_mb        = 512

# Compress /boot as a tar.gz archive instead of a plain directory copy
#   yes -> smaller backup, slightly slower  (boot_backup.tar.gz)
#   no  -> fast cp -a                       (boot/ directory)
#boot_compress      = no

# Automatically roll back if the update, systemctl, or kernel checks fail
#auto_rollback      = yes

# Create a read-only filesystem snapshot before updating (Btrfs / ZFS only)
#snapshot           = yes

# Age limit (seconds) for the kernel image after an update; used to detect
# a failed mkinitcpio/kernel install
#kernel_fresh_secs  = 300

# Desktop notifications via notify-send (requires libnotify)
#notify_libnotify   = no

# Telegram notifications via curl
#notify_telegram    = no
#telegram_token     =
#telegram_chat_id   =
#telegram_api_url   = https://api.telegram.org
